const TABLE_NAME = "user_progress";

// Supabase REST helper (no SDK needed)
const sbHeaders = {
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
};

async function sbLoad(userName) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?user_name=eq.${encodeURIComponent(userName)}&select=*`,
      { headers: sbHeaders }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();
    return rows.length > 0 ? rows[0] : null;
  } catch (e) {
    console.warn("Supabase load failed:", e);
    return null;
  }
}

async function sbSave(userName, data) {
  try {
    // upsert: insert or update
    const body = {
      user_name: userName,
      vocab_progress: data.vocabProgress || {},
      grammar_progress: data.grammarProgress || {},
      review_schedule: data.reviewSchedule || [],
      daily_log: data.dailyLog || {},
      error_progress: data.errorProgress || {},
      scanned_errors: data.scannedErrors || [],
      updated_at: new Date().toISOString()
    };
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?on_conflict=user_name`,
      {
        method: "POST",
        headers: { ...sbHeaders, "Prefer": "return=representation,resolution=merge-duplicates" },
        body: JSON.stringify(body)
      }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return true;
  } catch (e) {
    console.warn("Supabase save failed:", e);
    return false;
  }
}

  const allErrors = useMemo(() => [...ERROR_BOOK_DATA, ...scannedErrors], [scannedErrors]);

  useEffect(() => {
    dataRef.current = { vocabProgress, reviewSchedule, dailyLog, errorProgress, scannedErrors };
  }, [vocabProgress, reviewSchedule, dailyLog, errorProgress, scannedErrors]);

  // Load: try Supabase first, fallback to local storage
  useEffect(() => {
    (async () => {
      let loadedFromCloud = false;

      // Try Supabase first
      const cloudData = await sbLoad(userName);
      if (cloudData) {
        const vp = cloudData.vocab_progress || {};
        const rs = cloudData.review_schedule || [];
        const dl = cloudData.daily_log || {};
        const ep = cloudData.error_progress || {};
        const se = cloudData.scanned_errors || [];
        setVocabProgress(vp);
        setReviewSchedule(rs);
        setDailyLog(dl);
        setErrorProgress(ep);
        setScannedErrors(se);
        loadedFromCloud = true;
        setSyncStatus("synced");
        // Also save to local as cache
        try {
          localStorage.setItem("vocabProgress", JSON.stringify(vp));
          localStorage.setItem("reviewSchedule", JSON.stringify(rs));
          localStorage.setItem("dailyLog", JSON.stringify(dl));
          localStorage.setItem("errorProgress", JSON.stringify(ep));
          localStorage.setItem("scannedErrors", JSON.stringify(se));
        } catch {}
      }

      // Fallback: load from local
      if (!loadedFromCloud) {
        setSyncStatus("offline");
        const keys = ["vocabProgress","reviewSchedule","dailyLog","errorProgress","scannedErrors"];
        const setters = [setVocabProgress, setReviewSchedule, setDailyLog, setErrorProgress, setScannedErrors];
        for (let i = 0; i < keys.length; i++) {
          try { const v = localStorage.getItem(keys[i]); if (v) setters[i](JSON.parse(v)); } catch {}
        }
      }

      setLoaded(true);
    })();
  }, [userName]);

    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}

    // Debounce cloud save (wait 1.5s after last change)
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {

function ErrorBookView({ep,save,allErrors,scannedErrors,saveScanned}) {
  const [mode,setMode] = useState("list"); // list, practice, detail, scan
  const [filter,setFilter] = useState("all"); // all, unmastered, mastered
  const [practiceIdx,setPracticeIdx] = useState(0);
  const [answer,setAnswer] = useState("");
  const [result,setResult] = useState(null);
  const [detailId,setDetailId] = useState(null);
  const [practiceList,setPracticeList] = useState([]);
  // Scan state
  const [scanImage, setScanImage] = useState(null);
  const [scanPreview, setScanPreview] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [scanResults, setScanResults] = useState(null);
  const [scanError, setScanError] = useState(null);
  const fileInputRef = useRef(null);

  const categories = [...new Set(allErrors.map(e=>e.category))];
  const [catFilter,setCatFilter] = useState("all");

  const filtered = allErrors.filter(e => {
    const level = ep[e.id] || 0;
    if (filter==="unmastered" && level>=2) return false;
    if (filter==="mastered" && level<2) return false;
    if (catFilter!=="all" && e.category!==catFilter) return false;
    return true;
  });

  const startPractice = () => {
    const unmastered = allErrors.filter(e=>(ep[e.id]||0)<2);
    if (unmastered.length===0) { alert("所有错题都已掌握！太棒了！"); return; }
    const shuffled = [...unmastered].sort(()=>Math.random()-.5).slice(0,8);
    setPracticeList(shuffled);
    setPracticeIdx(0);
    setAnswer("");
    setResult(null);
    setMode("practice");
  };

  // Handle photo selection
  const handlePhotoSelect = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      setScanPreview(ev.target.result);
      // Extract base64 data (remove prefix)
      const base64 = ev.target.result.split(",")[1];
      setScanImage(base64);
      setScanResults(null);
      setScanError(null);
    };
    reader.readAsDataURL(file);
  };

  // Call Claude API to analyze the image
  const analyzeImage = async () => {
    if (!scanImage) return;
    setScanning(true);
    setScanError(null);
    setScanResults(null);

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: "image/jpeg", data: scanImage }
              },
              {
                type: "text",
                text: `You are analyzing a Chinese middle school English exercise sheet (一课一练). The image shows printed questions with handwritten student answers and teacher's red pen corrections.

Please identify ALL wrong answers (marked wrong by the teacher or clearly incorrect). For each error, output a JSON array with objects containing:
- "question": the original question text (in English)
- "wrongAnswer": what the student wrote
- "correctAnswer": the correct answer
- "category": one of "单词拼写", "语法选择", "中译英", "句型转换", "完形填空", "阅读回答", "词汇理解", "写作纠错"
- "unit": estimated unit number (1-6), or 0 if unclear
- "difficulty": "基础", "中等", or "较难"
- "explanation": brief explanation in Chinese of why the answer is wrong and what the correct rule is

IMPORTANT: Respond with ONLY a valid JSON array, no markdown, no backticks, no explanation outside the JSON. If you can't find any errors, return [].`
              }
            ]
          }]
        })
      });

      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }

      const data = await response.json();
      const text = data.content?.[0]?.text || "[]";
      
      // Parse JSON, handling potential markdown wrapping
      let cleaned = text.trim();
      if (cleaned.startsWith("```")) {
        cleaned = cleaned.replace(/^```[a-z]*\n?/, "").replace(/\n?```$/, "");
      }
      
      const parsed = JSON.parse(cleaned);
      if (Array.isArray(parsed) && parsed.length > 0) {
        setScanResults(parsed);
      } else {
        setScanError("没有在图片中发现错题。请确保拍到了老师批改过的内容。");
      }
    } catch (e) {
      console.error("Scan error:", e);
      setScanError(`识别失败: ${e.message}。请检查图片是否清晰。`);
    } finally {
      setScanning(false);
    }
  };

  // Add scanned results to error book
  const addScannedErrors = () => {
    if (!scanResults || scanResults.length === 0) return;
    const timestamp = Date.now();
    const newErrors = scanResults.map((r, i) => ({
      id: `scan_${timestamp}_${i}`,
      unit: r.unit || 0,
      type: "scanned",
      difficulty: r.difficulty || "中等",
      category: r.category || "语法选择",
      question: r.question,
      wrongAnswer: r.wrongAnswer,
      correctAnswer: r.correctAnswer,
      explanation: r.explanation || "",
      relatedWords: [],
      practiceType: "fill",
      scannedAt: new Date().toISOString()
    }));
    const updated = [...(scannedErrors || []), ...newErrors];
    saveScanned(updated);
    setMode("list");
    setScanImage(null);
    setScanPreview(null);
    setScanResults(null);
    alert(`成功添加 ${newErrors.length} 道错题！`);
  };

  // Delete a scanned error
  const deleteScannedError = (id) => {
    if (!confirm("确定删除这道错题？")) return;
    const updated = scannedErrors.filter(e => e.id !== id);
    saveScanned(updated);
  };

  const checkPractice = () => {
    const item = practiceList[practiceIdx];
    const correct = answer.trim().toLowerCase() === item.correctAnswer.split("（")[0].split("(")[0].trim().toLowerCase() 
      || answer.trim().toLowerCase() === item.correctAnswer.toLowerCase();
    setResult(correct ? "correct" : "wrong");
  };

  const nextPractice = async () => {
    const item = practiceList[practiceIdx];
    const prev = ep[item.id] || 0;
    const next = result==="correct" ? Math.min(prev+1,3) : 0;
    await save({...ep, [item.id]: next});
    
    if (practiceIdx < practiceList.length-1) {
      setPracticeIdx(practiceIdx+1);
      setAnswer("");
      setResult(null);
    } else {
      setMode("list");
    }
  };

  // DETAIL VIEW
  if (mode==="detail" && detailId) {
    const item = allErrors.find(e=>e.id===detailId);
    if (!item) { setMode("list"); return null; }
    const level = ep[item.id] || 0;
    return <div>
      <button onClick={()=>setMode("list")} style={{fontSize:14,color:"#666",background:"none",marginBottom:16}}>← 返回错题列表</button>
      <div className="card fi">
        <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
          <span className="tag" style={{background:"#e8f0ff",color:"#4a7dff"}}>Unit {item.unit}</span>
          <span className="tag" style={{background:item.difficulty==="基础"?"#e8f5e9":"#fff3e0",color:item.difficulty==="基础"?"#4caf50":"#e8723a"}}>{item.difficulty}</span>
          <span className="tag" style={{background:"#f3e5f5",color:"#9c27b0"}}>{item.category}</span>
          <span className="tag" style={{background:level>=2?"#e8f5e9":"#fee",color:level>=2?"#4caf50":"#e94560"}}>{level>=2?"已掌握":"待攻克"}</span>
        </div>

        <h3 style={{fontSize:17,fontWeight:700,marginBottom:16}}>{item.question}</h3>

        <div style={{padding:16,background:"#fff0f0",borderRadius:12,marginBottom:12,borderLeft:"4px solid #e94560"}}>
          <div style={{fontSize:12,fontWeight:600,color:"#e94560",marginBottom:4}}>❌ 你的错误答案</div>
          <div style={{fontSize:15,color:"#c62828"}}>{item.wrongAnswer}</div>
        </div>

        <div style={{padding:16,background:"#e8f5e9",borderRadius:12,marginBottom:12,borderLeft:"4px solid #4caf50"}}>
          <div style={{fontSize:12,fontWeight:600,color:"#4caf50",marginBottom:4}}>✅ 正确答案</div>
          <div style={{fontSize:15,color:"#2e7d32",fontWeight:600}}>{item.correctAnswer}</div>
        </div>

        <div style={{padding:16,background:"#f8f9ff",borderRadius:12,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:600,color:"#4a7dff",marginBottom:6}}>💡 解析</div>
          <div style={{fontSize:14,lineHeight:1.8,color:"#333"}}>{item.explanation}</div>
        </div>

        {item.relatedWords.length > 0 && (
          <div style={{padding:12,background:"#fafafa",borderRadius:10}}>
            <div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:6}}>📎 相关单词</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {item.relatedWords.map((w,i) => <span key={i} className="tag" style={{background:"#e8f0ff",color:"#4a7dff"}}>{w}</span>)}
            </div>
          </div>
        )}
      </div>
    </div>;
  }

  // PRACTICE MODE
  if (mode==="practice" && practiceList.length > 0) {
    const item = practiceList[practiceIdx];
    return <div>
      <button onClick={()=>setMode("list")} style={{fontSize:14,color:"#666",background:"none",marginBottom:16}}>← 退出练习</button>
      <div style={{textAlign:"center",marginBottom:14,fontSize:13,color:"#888"}}>
        错题攻克 · {practiceIdx+1}/{practiceList.length}
        <div className="pb" style={{marginTop:6}}><div className="pf" style={{width:`${(practiceIdx+1)/practiceList.length*100}%`,background:"#e94560"}}/></div>
      </div>
      <div className="card fi" style={{padding:"28px 20px"}}>
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          <span className="tag" style={{background:"#f3e5f5",color:"#9c27b0"}}>{item.category}</span>
          <span className="tag" style={{background:"#fff3e0",color:"#e8723a"}}>{item.difficulty}</span>
        </div>
        <div style={{fontSize:16,fontWeight:600,lineHeight:1.7,marginBottom:8}}>{item.question}</div>
        <div style={{fontSize:13,color:"#c62828",marginBottom:20}}>你上次写的：<s>{item.wrongAnswer}</s></div>

        <input className="qi" value={answer} onChange={e=>setAnswer(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&(result===null?checkPractice():nextPractice())}
          placeholder="输入正确答案..." disabled={result!==null} autoFocus
          style={result!==null?{borderColor:result==="correct"?"#4caf50":"#e94560",background:result==="correct"?"#e8f5e9":"#fee"}:{}}
        />

        {result!==null && <div className="fi" style={{marginTop:14}}>
          {result==="correct" ? (
            <div style={{color:"#4caf50",fontWeight:600,fontSize:15}}>✅ 正确！</div>
          ) : (
            <div>
              <div style={{color:"#e94560",fontWeight:600,fontSize:15}}>❌ 正确答案：{item.correctAnswer}</div>
              <div style={{marginTop:8,padding:12,background:"#f8f9ff",borderRadius:10,fontSize:13,lineHeight:1.7,color:"#555"}}>{item.explanation}</div>
            </div>
          )}
        </div>}

        <div style={{marginTop:20,textAlign:"center"}}>
          {result===null ? (
            <button onClick={checkPractice} style={{padding:"12px 36px",background:"#e94560",color:"#fff",borderRadius:12,fontSize:15,fontWeight:600}}>检查</button>
          ) : (
            <button onClick={nextPractice} style={{padding:"12px 36px",background:"#1a1a2e",color:"#fff",borderRadius:12,fontSize:15,fontWeight:600}}>
              {practiceIdx<practiceList.length-1?"下一题 →":"完成"}
            </button>
          )}
        </div>
      </div>
    </div>;
  }

  // LIST MODE
  return <div>
    {/* Stats banner */}
    <div className="card" style={{background:"linear-gradient(135deg,#e94560,#ff6b6b)",color:"#fff",padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:13,opacity:.8}}>一课一练错题本</div>
          <div style={{fontSize:20,fontWeight:700,marginTop:4}}>共 {ERROR_BOOK_DATA.length} 道错题</div>
        </div>
        <div style={{display:"flex",gap:12}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:900}}>{Object.values(ep).filter(v=>v>=2).length}</div>
            <div style={{fontSize:11,opacity:.8}}>已掌握</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:900}}>{ERROR_BOOK_DATA.length-Object.values(ep).filter(v=>v>=2).length}</div>
            <div style={{fontSize:11,opacity:.8}}>待攻克</div>
          </div>
        </div>
      </div>
      <div className="pb" style={{marginTop:12,background:"rgba(255,255,255,.3)"}}>
        <div className="pf" style={{width:`${ERROR_BOOK_DATA.length>0?Object.values(ep).filter(v=>v>=2).length/ERROR_BOOK_DATA.length*100:0}%`,background:"#fff"}}/>
      </div>
    </div>

    {/* Start practice button */}
    <button onClick={startPractice} style={{width:"100%",padding:16,background:"linear-gradient(135deg,#1a1a2e,#16213e)",color:"#fff",borderRadius:14,fontSize:17,fontWeight:700,marginBottom:14}}>
      ⚔️ 开始攻克错题
    </button>

    {/* Filters */}
    <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
      {[{id:"all",label:"全部"},{id:"unmastered",label:"待攻克"},{id:"mastered",label:"已掌握"}].map(f => (
        <button key={f.id} onClick={()=>setFilter(f.id)} style={{padding:"8px 14px",borderRadius:8,fontSize:12,fontWeight:600,
          background:filter===f.id?"#1a1a2e":"#fff",color:filter===f.id?"#fff":"#666",border:filter===f.id?"none":"1px solid #ddd",whiteSpace:"nowrap"}}>
          {f.label}
        </button>
      ))}
      <div style={{width:1,background:"#ddd",margin:"0 4px"}}/>
      <button onClick={()=>setCatFilter("all")} style={{padding:"8px 12px",borderRadius:8,fontSize:12,fontWeight:600,
        background:catFilter==="all"?"#e94560":"#fff",color:catFilter==="all"?"#fff":"#666",border:catFilter==="all"?"none":"1px solid #ddd",whiteSpace:"nowrap"}}>所有类型</button>
      {categories.map(c => (
        <button key={c} onClick={()=>setCatFilter(c)} style={{padding:"8px 12px",borderRadius:8,fontSize:12,fontWeight:600,
          background:catFilter===c?"#e94560":"#fff",color:catFilter===c?"#fff":"#666",border:catFilter===c?"none":"1px solid #ddd",whiteSpace:"nowrap",flex:"0 0 auto"}}>
          {c}
        </button>
      ))}
    </div>

    {/* Error list */}
    {filtered.map(e => {
      const level = ep[e.id] || 0;
      return <div key={e.id} className="card" style={{padding:14,cursor:"pointer",borderLeft:`4px solid ${level>=2?"#4caf50":"#e94560"}`}} onClick={()=>{setDetailId(e.id);setMode("detail")}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:4,marginBottom:6,flexWrap:"wrap"}}>
              <span className="tag" style={{background:"#e8f0ff",color:"#4a7dff"}}>U{e.unit}</span>
              <span className="tag" style={{background:"#f3e5f5",color:"#9c27b0"}}>{e.category}</span>
              <span className="tag" style={{background:e.difficulty==="基础"?"#e8f5e9":e.difficulty==="中等"?"#fff3e0":"#fce4ec",color:e.difficulty==="基础"?"#4caf50":e.difficulty==="中等"?"#e8723a":"#c62828"}}>{e.difficulty}</span>
            </div>
            <div style={{fontSize:14,fontWeight:500,lineHeight:1.5,color:"#333"}}>{e.question}</div>
            <div style={{fontSize:12,color:"#c62828",marginTop:4}}>错答：<s>{e.wrongAnswer}</s></div>
          </div>
          <div style={{textAlign:"center",minWidth:50}}>
            <div style={{fontSize:20}}>{level>=2?"✅":"🔴"}</div>
            <div style={{fontSize:10,color:"#999",marginTop:2}}>{level>=2?"已掌握":level===1?"练习中":"待练习"}</div>
          </div>
        </div>
      </div>;
    })}

    {filtered.length===0 && <div style={{textAlign:"center",padding:40,color:"#888"}}>
      <div style={{fontSize:40,marginBottom:8}}>🎉</div>
      <div style={{fontSize:15,fontWeight:600}}>这个分类下没有错题了！</div>
    </div>}
  </div>;
}

// VOCAB VIEW
// ============================================================
function VocabView({unit,setUnit,vp,save,rs,saveRs,today}) {
  const [mode,setMode] = useState("browse");
  const [idx,setIdx] = useState(0);
  const [show,setShow] = useState(false);
  const [testWords,setTestWords] = useState([]);
  const [ti,setTi] = useState(0);
  const [ta,setTa] = useState("");
  const [tr,setTr] = useState(null);
  const [score,setScore] = useState({c:0,t:0});

  const words = VOCAB_DATA[unit].words;
  const batch = words.filter(w=>(vp[w.en]?.level||0)<3).slice(0,10);

  const markWord = async (word,known) => {
    const prev = vp[word.en] || {level:0};
    const nl = known ? Math.min(prev.level+1,5) : Math.max(prev.level-1,0);
    await save({...vp, [word.en]:{level:nl,lastDate:today}});
    if (known && nl>=1) {
      const days = EBB_INTERVALS[Math.min(nl-1,EBB_INTERVALS.length-1)];
      const d = new Date(); d.setDate(d.getDate()+days);
      await saveRs([...rs.filter(r=>r.word!==word.en||r.date!==d.toISOString().slice(0,10)), {word:word.en,zh:word.zh,date:d.toISOString().slice(0,10),done:false,unit}]);
    }
    if (idx<batch.length-1) { setIdx(idx+1); setShow(false); } else setMode("browse");
  };

  if (mode==="learn" && batch[idx]) {
    const w = batch[idx];
    return <div>
      <button onClick={()=>setMode("browse")} style={{fontSize:14,color:"#666",background:"none",marginBottom:14}}>← 返回</button>
      <div style={{textAlign:"center",fontSize:13,color:"#888",marginBottom:14}}>{idx+1}/{batch.length}</div>
      <div className="card fi" style={{textAlign:"center",padding:"36px 20px"}}>
        <span className="tag" style={{background:"#e8f0ff",color:"#4a7dff"}}>{w.pos}</span>
        <h2 style={{fontSize:34,fontWeight:900,marginTop:14}}>{w.en}</h2>
        <div style={{fontSize:14,color:"#aaa",marginTop:6}}>{w.phonetic}</div>
        {show ? <div className="fi" style={{marginTop:20}}>
          <div style={{fontSize:20,color:"#333",fontWeight:500}}>{w.zh}</div>
          <div style={{marginTop:28,display:"flex",gap:12,justifyContent:"center"}}>
            <button onClick={()=>markWord(w,false)} style={{padding:"12px 28px",background:"#fee",color:"#e94560",borderRadius:12,fontSize:15,fontWeight:600}}>😕 不认识</button>
            <button onClick={()=>markWord(w,true)} style={{padding:"12px 28px",background:"#e8f5e9",color:"#4caf50",borderRadius:12,fontSize:15,fontWeight:600}}>😊 认识</button>
          </div>
        </div> : <button onClick={()=>setShow(true)} style={{marginTop:28,padding:"12px 36px",background:"#4a7dff",color:"#fff",borderRadius:12,fontSize:15,fontWeight:600}}>翻开看看</button>}
      </div>
    </div>;
  }

  if (mode==="test") {
    const tw = testWords[ti];
    if (!tw) { setMode("browse"); return null; }
    return <div>
      <button onClick={()=>setMode("browse")} style={{fontSize:14,color:"#666",background:"none",marginBottom:14}}>← 返回</button>
      <div style={{textAlign:"center",fontSize:13,color:"#888",marginBottom:14}}>听写 {ti+1}/{testWords.length} · 正确 {score.c}/{score.t}</div>
      <div className="card fi" style={{textAlign:"center",padding:"28px 20px"}}>
        <div style={{fontSize:12,color:"#888",marginBottom:6}}>写出英文单词</div>
        <div style={{fontSize:26,fontWeight:700,marginBottom:6}}>{tw.zh}</div>
        <div style={{fontSize:13,color:"#bbb",marginBottom:20}}>{tw.pos}</div>
        <input className="qi" value={ta} onChange={e=>setTa(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&(tr===null?(()=>{const c=ta.trim().toLowerCase()===tw.en.toLowerCase();setTr(c);setScore(s=>({c:s.c+(c?1:0),t:s.t+1}))})():(ti<testWords.length-1?(setTi(ti+1),setTa(""),setTr(null)):setMode("browse")))}
          placeholder="输入英文..." disabled={tr!==null} autoFocus
          style={tr!==null?{borderColor:tr?"#4caf50":"#e94560",background:tr?"#e8f5e9":"#fee"}:{}}
        />
        {tr!==null && <div className="fi" style={{marginTop:12}}>
          {tr ? <div style={{color:"#4caf50",fontWeight:600}}>✅ 正确！</div> : <div><div style={{color:"#e94560",fontWeight:600}}>❌ 正确：{tw.en}</div><div style={{color:"#aaa",fontSize:13}}>{tw.phonetic}</div></div>}
        </div>}
        <div style={{marginTop:20}}>
          {tr===null ?
            <button onClick={()=>{const c=ta.trim().toLowerCase()===tw.en.toLowerCase();setTr(c);setScore(s=>({c:s.c+(c?1:0),t:s.t+1}))}} style={{padding:"12px 36px",background:"#4a7dff",color:"#fff",borderRadius:12,fontSize:15,fontWeight:600}}>检查</button>
            : <button onClick={()=>{if(ti<testWords.length-1){setTi(ti+1);setTa("");setTr(null)}else setMode("browse")}} style={{padding:"12px 36px",background:"#1a1a2e",color:"#fff",borderRadius:12,fontSize:15,fontWeight:600}}>{ti<testWords.length-1?"下一个 →":"完成"}</button>
          }
        </div>
      </div>
    </div>;
  }

  return <div>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16,paddingBottom:4}}>
      {Object.entries(VOCAB_DATA).map(([u,d])=>{
        const m=d.words.filter(w=>(vp[w.en]?.level||0)>=3).length;
        return <button key={u} onClick={()=>setUnit(Number(u))} style={{padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:600,
          background:Number(u)===unit?"#1a1a2e":"#fff",color:Number(u)===unit?"#fff":"#333",border:Number(u)===unit?"none":"1px solid #ddd",whiteSpace:"nowrap",flex:"0 0 auto"}}>
          U{u} {m}/{d.words.length}
        </button>;
      })}
    </div>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      <button onClick={()=>{if(batch.length===0){alert("已全部掌握！");return}setIdx(0);setShow(false);setMode("learn")}} style={{flex:1,padding:14,background:"linear-gradient(135deg,#4a7dff,#6a9dff)",color:"#fff",borderRadius:12,fontSize:15,fontWeight:700}}>📖 学习新词</button>
      <button onClick={()=>{const t=words.filter(w=>(vp[w.en]?.level||0)>=1);if(t.length<3){alert("先学几个词再测试！");return}setTestWords([...t].sort(()=>Math.random()-.5).slice(0,10));setTi(0);setTa("");setTr(null);setScore({c:0,t:0});setMode("test")}} style={{flex:1,padding:14,background:"linear-gradient(135deg,#e94560,#ff6b6b)",color:"#fff",borderRadius:12,fontSize:15,fontWeight:700}}>✍️ 听写</button>
    </div>
    <div className="card">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:4}}>Unit {unit}: {VOCAB_DATA[unit].name}</h3>
      <p style={{fontSize:12,color:"#999",marginBottom:14}}>{words.length} 个单词</p>
      {words.map((w,i)=>{
        const l=vp[w.en]?.level||0;
        const c=["#eee","#ffeaa7","#fdcb6e","#55efc4","#00b894","#00b894"];
        return <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"#fafafa",borderRadius:8,marginBottom:6,borderLeft:`3px solid ${c[l]}`}}>
          <div style={{flex:1}}><span style={{fontWeight:600,fontSize:14}}>{w.en}</span><span style={{color:"#bbb",fontSize:11,marginLeft:6}}>{w.phonetic}</span></div>
          <span style={{fontSize:13,color:"#555"}}>{w.zh}</span>
          <span className="tag" style={{background:c[l]+"33",color:l>=3?"#00b894":l>0?"#e17055":"#999",minWidth:32,textAlign:"center"}}>{l>=3?"✓":l>0?`L${l}`:"新"}</span>
        </div>;
      })}
    </div>
  </div>;
}

function GrammarView({cur,setCur}) {
  const [exMode,setExMode] = useState(false);
  const [ei,setEi] = useState(0);
  const [a,setA] = useState("");
  const [r,setR] = useState(null);
  const [sc,setSc] = useState({c:0,t:0});

  const g = GRAMMAR_DATA[cur];

  if (exMode) {
    const ex = g.exercises[ei];
    return <div>
      <button onClick={()=>setExMode(false)} style={{fontSize:14,color:"#666",background:"none",marginBottom:14}}>← 返回</button>
      <div style={{textAlign:"center",fontSize:13,color:"#888",marginBottom:14}}>{g.title} · {ei+1}/{g.exercises.length} · 正确 {sc.c}/{sc.t}</div>
      <div className="card fi" style={{padding:"28px 20px"}}>
        <span className="tag" style={{background:"#fff3e0",color:"#e8723a",marginBottom:14}}>{ex.hint}</span>
        <div style={{fontSize:16,fontWeight:600,lineHeight:1.7,marginBottom:20,marginTop:10}}>{ex.q}</div>
        <input className="qi" value={a} onChange={e=>setA(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&(r===null?(()=>{const c=a.trim().toLowerCase()===ex.a.toLowerCase();setR(c);setSc(s=>({c:s.c+(c?1:0),t:s.t+1}))})():(ei<g.exercises.length-1?(setEi(ei+1),setA(""),setR(null)):setExMode(false)))}
          placeholder="输入答案..." disabled={r!==null} autoFocus
          style={r!==null?{borderColor:r?"#4caf50":"#e94560",background:r?"#e8f5e9":"#fee"}:{}}
        />
        {r!==null && <div className="fi" style={{marginTop:12}}>
          {r ? <div style={{color:"#4caf50",fontWeight:600}}>✅ 正确！</div> : <div style={{color:"#e94560",fontWeight:600}}>❌ 正确答案：{ex.a}</div>}
        </div>}
        <div style={{marginTop:20,textAlign:"center"}}>
          {r===null ?
            <button onClick={()=>{const c=a.trim().toLowerCase()===ex.a.toLowerCase();setR(c);setSc(s=>({c:s.c+(c?1:0),t:s.t+1}))}} style={{padding:"12px 36px",background:"#e8723a",color:"#fff",borderRadius:12,fontSize:15,fontWeight:600}}>检查</button>
            : <button onClick={()=>{ei<g.exercises.length-1?(setEi(ei+1),setA(""),setR(null)):setExMode(false)}} style={{padding:"12px 36px",background:"#1a1a2e",color:"#fff",borderRadius:12,fontSize:15,fontWeight:600}}>{ei<g.exercises.length-1?"下一题 →":"完成"}</button>
          }
        </div>
      </div>
    </div>;
  }

  return <div>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16,paddingBottom:4}}>
      {GRAMMAR_DATA.map((gg,i)=><button key={i} onClick={()=>setCur(i)} style={{padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:600,
        background:i===cur?"#e8723a":"#fff",color:i===cur?"#fff":"#333",border:i===cur?"none":"1px solid #ddd",whiteSpace:"nowrap",flex:"0 0 auto"}}>{gg.title}</button>)}
    </div>
    <div className="card">
      <span className="tag" style={{background:"#e8f0ff",color:"#4a7dff",marginBottom:10}}>Unit {g.unit}</span>
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:6,marginTop:8}}>{g.title}</h2>
      <p style={{fontSize:13,color:"#666",lineHeight:1.6,marginBottom:16}}>{g.explanation}</p>
      {g.rules.map((rr,i)=><div key={i} style={{padding:14,background:i%2===0?"#f8f9ff":"#fff8f0",borderRadius:10,marginBottom:8}}>
        <div style={{fontWeight:600,fontSize:13,color:"#333",marginBottom:4}}>{rr.rule}</div>
        <div style={{fontSize:14,color:"#4a7dff",fontWeight:500}}>{rr.example}</div>
        <div style={{fontSize:12,color:"#888",marginTop:2}}>{rr.translation}</div>
      </div>)}
    </div>
    <button onClick={()=>{setExMode(true);setEi(0);setA("");setR(null);setSc({c:0,t:0})}} style={{width:"100%",padding:16,background:"linear-gradient(135deg,#e8723a,#ff9a56)",color:"#fff",borderRadius:14,fontSize:16,fontWeight:700}}>
      ✏️ 开始练习 ({g.exercises.length}题)
    </button>
  </div>;
}

      <div style={{fontSize:14,lineHeight:2,color:"#333",padding:16,background:"#fafafa",borderRadius:10,borderLeft:"4px solid #4caf50"}}>{rd.text}</div>
    </div>
    <div className="card">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:6}}>❓ 阅读理解题</h3>
      <p style={{fontSize:12,color:"#e94560",marginBottom:14}}>💡 用完整句子回答！</p>
      {rd.questions.map((q,i)=><div key={i} style={{marginBottom:16,padding:14,background:"#fafafa",borderRadius:10}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>{i+1}. {q.q}</div>
        <textarea value={userAns[i]||""} onChange={e=>setUserAns(p=>({...p,[i]:e.target.value}))} placeholder="写答案..." rows={2}
          style={{width:"100%",padding:10,border:"1px solid #e0e0e0",borderRadius:8,fontSize:13,fontFamily:"inherit",resize:"vertical",outline:"none"}}/>
        <button onClick={()=>setShowAns(p=>({...p,[i]:!p[i]}))} style={{marginTop:6,fontSize:12,color:"#4a7dff",background:"none",fontWeight:500}}>
          {showAns[i]?"🙈 隐藏答案":"👁 看答案"}
        </button>
        {showAns[i] && <div className="fi" style={{marginTop:6,padding:10,background:"#e8f5e9",borderRadius:8,fontSize:13,color:"#2e7d32"}}><b>参考：</b>{q.a}</div>}
      </div>)}
    </div>
  </div>;
}

// ============================================================
// REVIEW VIEW (Ebbinghaus)
// ============================================================
function ReviewView({vp,saveVp,rs,saveRs,today}) {
  const [ri,setRi] = useState(0);
  const [show,setShow] = useState(false);
  const [active,setActive] = useState(false);

  const due = rs.filter(r=>r.date<=today&&!r.done);
  const upcoming = {};
  rs.filter(r=>r.date>today&&!r.done).forEach(r=>{upcoming[r.date]=(upcoming[r.date]||0)+1});

  const handleReview = async (known) => {
    const item = due[ri];
    let updated = rs.map(r=>r.word===item.word&&r.date===item.date?{...r,done:true}:r);
    const prev = vp[item.word]||{level:0};
    const nl = known ? Math.min(prev.level+1,5) : Math.max(prev.level-1,0);
    await saveVp({...vp,[item.word]:{level:nl,lastDate:today}});
    if (known && nl<5) {
      const d=new Date();d.setDate(d.getDate()+EBB_INTERVALS[Math.min(nl,EBB_INTERVALS.length-1)]);
      updated.push({word:item.word,zh:item.zh,date:d.toISOString().slice(0,10),done:false,unit:item.unit});
    } else if (!known) {
      const d=new Date();d.setDate(d.getDate()+1);
      updated.push({word:item.word,zh:item.zh,date:d.toISOString().slice(0,10),done:false,unit:item.unit});
    }
    await saveRs(updated);
    if (ri<due.length-1){setRi(ri+1);setShow(false)} else setActive(false);
  };

  if (active && due[ri]) {
    const item = due[ri];
    return <div>
      <button onClick={()=>setActive(false)} style={{fontSize:14,color:"#666",background:"none",marginBottom:14}}>← 返回</button>
      <div style={{textAlign:"center",fontSize:13,color:"#888",marginBottom:14}}>复习 {ri+1}/{due.length}</div>
      <div className="card fi" style={{textAlign:"center",padding:"40px 20px"}}>
        <div style={{fontSize:13,color:"#888",marginBottom:6}}>你还记得吗？</div>
        <div style={{fontSize:20,color:"#555",fontWeight:600}}>{item.zh}</div>
        {show ? <div className="fi" style={{marginTop:20}}>
          <div style={{fontSize:34,fontWeight:900}}>{item.word}</div>
          <div style={{marginTop:28,display:"flex",gap:12,justifyContent:"center"}}>
            <button onClick={()=>handleReview(false)} style={{padding:"12px 28px",background:"#fee",color:"#e94560",borderRadius:12,fontSize:15,fontWeight:600}}>😕 不记得</button>
            <button onClick={()=>handleReview(true)} style={{padding:"12px 28px",background:"#e8f5e9",color:"#4caf50",borderRadius:12,fontSize:15,fontWeight:600}}>😊 记得</button>
          </div>
        </div> : <button onClick={()=>setShow(true)} style={{marginTop:24,padding:"12px 36px",background:"#e94560",color:"#fff",borderRadius:12,fontSize:15,fontWeight:600}}>显示答案</button>}
      </div>
    </div>;
  }

  return <div>
    <div className="card" style={{background:"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff"}}>
      <h3 style={{fontSize:17,fontWeight:700,marginBottom:6}}>🧠 艾宾浩斯遗忘曲线</h3>
      <p style={{fontSize:12,lineHeight:1.7,opacity:.9}}>按 1→2→4→7→15→30 天间隔复习，短期记忆变长期记忆。</p>
      <div style={{display:"flex",gap:4,marginTop:10,flexWrap:"wrap"}}>
        {EBB_INTERVALS.map((d,i)=><span key={i} style={{padding:"3px 8px",background:"rgba(255,255,255,.2)",borderRadius:6,fontSize:11}}>第{d}天</span>)}
      </div>
    </div>
    <div className="card">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>📅 今日复习</h3>
      {due.length>0 ? <>
        <p style={{fontSize:13,color:"#666",marginBottom:14}}>{due.length} 个单词需要复习</p>
        <button onClick={()=>{setRi(0);setShow(false);setActive(true)}} style={{width:"100%",padding:16,background:"linear-gradient(135deg,#e94560,#ff6b6b)",color:"#fff",borderRadius:14,fontSize:16,fontWeight:700}}>
          🔄 开始复习 ({due.length}个)
        </button>
      </> : <div style={{textAlign:"center",padding:30}}><div style={{fontSize:40,marginBottom:8}}>🎉</div><div style={{fontSize:15,fontWeight:600,color:"#4caf50"}}>今日无需复习！</div></div>}
    </div>
    {Object.keys(upcoming).length>0 && <div className="card">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>📆 未来复习</h3>
      {Object.entries(upcoming).sort().slice(0,7).map(([date,count])=><div key={date} style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",background:"#fafafa",borderRadius:8,marginBottom:6}}>
        <span style={{fontSize:13}}>{new Date(date).toLocaleDateString("zh-CN",{month:"short",day:"numeric",weekday:"short"})}</span>
        <span className="tag" style={{background:"#e8f0ff",color:"#4a7dff"}}>{count}词</span>
      </div>)}
    </div>}
  </div>;
}

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
