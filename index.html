    .tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-right: 6px; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

const Storage = {
  get(key) {
    return new Promise((resolve) => {
      try {
        const val = localStorage.getItem(key);
        resolve(val ? { value: val } : null);
      } catch { resolve(null); }
    });
  },
  set(key, value) {
    return new Promise((resolve) => {
      try {
        localStorage.setItem(key, value);
        resolve();
      } catch { resolve(); }
    });
  },
  delete(key) {
    return new Promise((resolve) => {
      try { localStorage.removeItem(key); } catch {}
      resolve();
    });
  }
};

function App() {
  const [view, setView] = useState("home");
  const [currentUnit, setCurrentUnit] = useState(1);

  const [currentReading, setCurrentReading] = useState(0);

  const [grammarProgress, setGrammarProgress] = useState({});
  const [reviewSchedule, setReviewSchedule] = useState([]);
  const [dailyLog, setDailyLog] = useState({});
  const [storageLoaded, setStorageLoaded] = useState(false);

  useEffect(() => {
    async function load() {
      try {
        const vp = await Storage.get("vocabProgress");
        if (vp) setVocabProgress(JSON.parse(vp.value));
      } catch {}
      try {
        const gp = await Storage.get("grammarProgress");
        if (gp) setGrammarProgress(JSON.parse(gp.value));
      } catch {}
      try {
        const rs = await Storage.get("reviewSchedule");
        if (rs) setReviewSchedule(JSON.parse(rs.value));
      } catch {}
      try {
        const dl = await Storage.get("dailyLog");
        if (dl) setDailyLog(JSON.parse(dl.value));
      } catch {}
      setStorageLoaded(true);
    }
    load();
  }, []);

  const saveVocab = useCallback(async (data) => {
    setVocabProgress(data);
    try { await Storage.set("vocabProgress", JSON.stringify(data)); } catch {}
  }, []);

    setGrammarProgress(data);
    try { await Storage.set("grammarProgress", JSON.stringify(data)); } catch {}
  }, []);

      {/* FOOTER */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(250,249,247,.95)", backdropFilter: "blur(10px)", borderTop: "1px solid #eee", padding: "8px 16px", textAlign: "center" }}>
        <button onClick={resetAll} style={{ fontSize: 12, color: "#999", background: "none", padding: "4px 12px" }}>重置进度</button>
      </div>
    </div>
  );
}

// ============================================================
// VOCAB VIEW
// ============================================================
function VocabView({ unit, setUnit, vocabProgress, saveVocab, reviewSchedule, saveReview, todayStr, dailyLog, saveDaily }) {
  const [mode, setMode] = useState("browse");
  const [learnIndex, setLearnIndex] = useState(0);
  const [showMeaning, setShowMeaning] = useState(false);
  const [testWords, setTestWords] = useState([]);
  const [testIndex, setTestIndex] = useState(0);
  const [testAnswer, setTestAnswer] = useState("");
  const [testResult, setTestResult] = useState(null);
  const [testScore, setTestScore] = useState({ correct: 0, total: 0 });
  const [showPhonetic, setShowPhonetic] = useState(false);

  const words = VOCAB_DATA[unit].words;

  const startLearn = () => {
    const unlearned = words.filter(w => (vocabProgress[w.en]?.level || 0) < 3);
    const batch = unlearned.slice(0, 10);
    if (batch.length === 0) {
      alert("这个单元的单词都已掌握！试试下一个单元吧。");
      return;
    }
    setLearnIndex(0);
    setShowMeaning(false);
    setShowPhonetic(false);
    setMode("learn");
  };

  const learnBatch = mode === "learn" ? words.filter(w => (vocabProgress[w.en]?.level || 0) < 3).slice(0, 10) : [];
  const currentWord = learnBatch[learnIndex];

  const markWord = async (word, known) => {
    const prev = vocabProgress[word.en] || { level: 0, lastDate: "" };
    const newLevel = known ? Math.min(prev.level + 1, 5) : Math.max(prev.level - 1, 0);
    const updated = { ...vocabProgress, [word.en]: { level: newLevel, lastDate: todayStr } };
    await saveVocab(updated);

    if (known && newLevel >= 1) {
      const intervalIdx = Math.min(newLevel - 1, EBBINGHAUS_INTERVALS.length - 1);
      const days = EBBINGHAUS_INTERVALS[intervalIdx];
      const reviewDate = new Date();
      reviewDate.setDate(reviewDate.getDate() + days);
      const dateStr = reviewDate.toISOString().slice(0, 10);
      const newSchedule = [...reviewSchedule.filter(r => r.word !== word.en || r.date !== dateStr), { word: word.en, zh: word.zh, date: dateStr, done: false, unit }];
      await saveReview(newSchedule);
    }

    if (learnIndex < learnBatch.length - 1) {
      setLearnIndex(learnIndex + 1);
      setShowMeaning(false);
      setShowPhonetic(false);
    } else {
      setMode("browse");
      const log = { ...dailyLog, [todayStr]: { ...(dailyLog[todayStr] || {}), vocab: true, done: true } };
      await saveDaily(log);
    }
  };

  const startTest = () => {
    const toTest = words.filter(w => (vocabProgress[w.en]?.level || 0) >= 1);
    if (toTest.length < 5) {
      alert("先学习至少5个单词再来测试！");
      return;
    }
    const shuffled = [...toTest].sort(() => Math.random() - 0.5).slice(0, 10);
    setTestWords(shuffled);
    setTestIndex(0);
    setTestAnswer("");
    setTestResult(null);
    setTestScore({ correct: 0, total: 0 });
    setMode("test");
  };

  const checkTest = () => {
    const correct = testAnswer.trim().toLowerCase() === testWords[testIndex].en.toLowerCase();
    setTestResult(correct);
    setTestScore(s => ({ correct: s.correct + (correct ? 1 : 0), total: s.total + 1 }));
  };

  const nextTest = async () => {
    if (!testResult) {
      const word = testWords[testIndex];
      const prev = vocabProgress[word.en] || { level: 0, lastDate: "" };
      const updated = { ...vocabProgress, [word.en]: { level: Math.max(prev.level - 1, 0), lastDate: todayStr } };
      await saveVocab(updated);
    }
    if (testIndex < testWords.length - 1) {
      setTestIndex(testIndex + 1);
      setTestAnswer("");
      setTestResult(null);
    } else {
      setMode("browse");
    }
  };

  if (mode === "learn" && currentWord) {
    return (
      <div>
        <button onClick={() => setMode("browse")} style={{ fontSize: 14, color: "#666", background: "none", marginBottom: 16, display: "flex", alignItems: "center", gap: 4 }}>← 返回</button>
        <div style={{ textAlign: "center", marginBottom: 16, fontSize: 13, color: "#888" }}>
          {learnIndex + 1} / {learnBatch.length}
          <div className="progress-bar" style={{ marginTop: 8 }}>
            <div className="progress-fill" style={{ width: `${(learnIndex + 1) / learnBatch.length * 100}%`, background: "#4a7dff" }} />
          </div>
        </div>
        <div className="card fade-in" style={{ textAlign: "center", padding: "40px 24px" }}>
          <div className="tag" style={{ background: "#e8f0ff", color: "#4a7dff" }}>{currentWord.pos}</div>
          <h2 style={{ fontSize: 36, fontWeight: 900, marginTop: 16, color: "#1a1a2e" }}>{currentWord.en}</h2>
          <button onClick={() => setShowPhonetic(!showPhonetic)} style={{ marginTop: 8, fontSize: 14, color: "#888", background: "none" }}>
            {showPhonetic ? currentWord.phonetic : "👁 显示音标"}
          </button>
          {showMeaning ? (
            <div className="fade-in" style={{ marginTop: 24 }}>
              <div style={{ fontSize: 22, color: "#333", fontWeight: 500 }}>{currentWord.zh}</div>
              <div style={{ marginTop: 32, display: "flex", gap: 12, justifyContent: "center" }}>
                <button onClick={() => markWord(currentWord, false)}
                  style={{ padding: "14px 32px", background: "#fee", color: "#e94560", borderRadius: 12, fontSize: 16, fontWeight: 600 }}>
                  😕 不认识
                </button>
                <button onClick={() => markWord(currentWord, true)}
                  style={{ padding: "14px 32px", background: "#e8f5e9", color: "#4caf50", borderRadius: 12, fontSize: 16, fontWeight: 600 }}>
                  😊 认识
                </button>
              </div>
            </div>
          ) : (
            <button onClick={() => setShowMeaning(true)}
              style={{ marginTop: 32, padding: "14px 40px", background: "#4a7dff", color: "#fff", borderRadius: 12, fontSize: 16, fontWeight: 600 }}>
              翻开看看
            </button>
          )}
        </div>
      </div>
    );
  }

  if (mode === "test" && testWords.length > 0) {
    const tw = testWords[testIndex];
    return (
      <div>
        <button onClick={() => setMode("browse")} style={{ fontSize: 14, color: "#666", background: "none", marginBottom: 16 }}>← 返回</button>
        <div style={{ textAlign: "center", marginBottom: 16, fontSize: 13, color: "#888" }}>
          听写测试 {testIndex + 1} / {testWords.length} · 正确 {testScore.correct}/{testScore.total}
        </div>
        <div className="card fade-in" style={{ textAlign: "center", padding: "32px 24px" }}>
          <div style={{ fontSize: 12, color: "#888", marginBottom: 8 }}>请写出这个词的英文</div>
          <div style={{ fontSize: 28, fontWeight: 700, color: "#1a1a2e", marginBottom: 8 }}>{tw.zh}</div>
          <div style={{ fontSize: 14, color: "#aaa", marginBottom: 24 }}>{tw.pos}</div>
          <input
            className="quiz-input"
            value={testAnswer}
            onChange={e => setTestAnswer(e.target.value)}
            onKeyDown={e => e.key === "Enter" && (testResult === null ? checkTest() : nextTest())}
            placeholder="输入英文单词..."
            disabled={testResult !== null}
            autoFocus
            style={testResult !== null ? { borderColor: testResult ? "#4caf50" : "#e94560", background: testResult ? "#e8f5e9" : "#fee" } : {}}
          />
          {testResult !== null && (
            <div className="fade-in" style={{ marginTop: 16 }}>
              {testResult ? (
                <div style={{ color: "#4caf50", fontWeight: 600 }}>✅ 正确！</div>
              ) : (
                <div>
                  <div style={{ color: "#e94560", fontWeight: 600 }}>❌ 正确答案：<span style={{ fontSize: 18 }}>{tw.en}</span></div>
                  <div style={{ color: "#888", fontSize: 13, marginTop: 4 }}>{tw.phonetic}</div>
                </div>
              )}
            </div>
          )}
          <div style={{ marginTop: 24 }}>
            {testResult === null ? (
              <button onClick={checkTest} style={{ padding: "14px 40px", background: "#4a7dff", color: "#fff", borderRadius: 12, fontSize: 16, fontWeight: 600 }}>
                检查
              </button>
            ) : (
              <button onClick={nextTest} style={{ padding: "14px 40px", background: "#1a1a2e", color: "#fff", borderRadius: 12, fontSize: 16, fontWeight: 600 }}>
                {testIndex < testWords.length - 1 ? "下一个 →" : "完成"}
              </button>
            )}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 20, paddingBottom: 4 }}>
        {Object.entries(VOCAB_DATA).map(([u, data]) => {
          const total = data.words.length;
          const mastered = data.words.filter(w => (vocabProgress[w.en]?.level || 0) >= 3).length;
          return (
            <button key={u} onClick={() => setUnit(Number(u))}
              style={{
                padding: "10px 16px", borderRadius: 12, fontSize: 13, fontWeight: 600,
                background: Number(u) === unit ? "#1a1a2e" : "#fff",
                color: Number(u) === unit ? "#fff" : "#333",
                border: Number(u) === unit ? "none" : "1px solid #ddd",
                whiteSpace: "nowrap", flex: "0 0 auto",
                boxShadow: Number(u) === unit ? "0 4px 12px rgba(0,0,0,.2)" : "none"
              }}>
              U{u} <span style={{ fontSize: 11, opacity: .7 }}>{mastered}/{total}</span>
            </button>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        <button onClick={startLearn}
          style={{ flex: 1, padding: 16, background: "linear-gradient(135deg, #4a7dff, #6a9dff)", color: "#fff", borderRadius: 14, fontSize: 16, fontWeight: 700 }}>
          📖 学习新词
        </button>
        <button onClick={startTest}
          style={{ flex: 1, padding: 16, background: "linear-gradient(135deg, #e94560, #ff6b6b)", color: "#fff", borderRadius: 14, fontSize: 16, fontWeight: 700 }}>
          ✍️ 听写测试
        </button>
      </div>
      <div className="card">
        <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>Unit {unit}: {VOCAB_DATA[unit].name}</h3>
        <p style={{ fontSize: 13, color: "#888", marginBottom: 16 }}>{words.length} 个单词</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {words.map((w, i) => {
            const level = vocabProgress[w.en]?.level || 0;
            const colors = ["#eee", "#ffeaa7", "#fdcb6e", "#55efc4", "#00b894", "#00b894"];
            return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", background: "#fafafa", borderRadius: 10, borderLeft: `4px solid ${colors[level]}` }}>
                <div style={{ flex: 1 }}>
                  <span style={{ fontWeight: 600, fontSize: 15 }}>{w.en}</span>
                  <span style={{ color: "#aaa", fontSize: 12, marginLeft: 8 }}>{w.phonetic}</span>
                </div>
                <span style={{ fontSize: 13, color: "#555" }}>{w.zh}</span>
                <span className="tag" style={{ background: colors[level] + "33", color: level >= 3 ? "#00b894" : level > 0 ? "#e17055" : "#999", minWidth: 36, textAlign: "center" }}>
                  {level >= 3 ? "✓" : level > 0 ? `L${level}` : "新"}
                </span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// GRAMMAR VIEW
// ============================================================
function GrammarView({ current, setCurrent, grammarProgress, saveGrammar }) {
  const [exerciseMode, setExerciseMode] = useState(false);
  const [exIndex, setExIndex] = useState(0);
  const [answer, setAnswer] = useState("");
  const [result, setResult] = useState(null);
  const [score, setScore] = useState({ correct: 0, total: 0 });

  const grammar = GRAMMAR_DATA[current];

  const startExercise = () => {
    setExerciseMode(true);
    setExIndex(0);
    setAnswer("");
    setResult(null);
    setScore({ correct: 0, total: 0 });
  };

  const checkAnswer = () => {
    const correct = answer.trim().toLowerCase() === grammar.exercises[exIndex].a.toLowerCase();
    setResult(correct);
    setScore(s => ({ correct: s.correct + (correct ? 1 : 0), total: s.total + 1 }));
  };

  const nextExercise = async () => {
    if (exIndex < grammar.exercises.length - 1) {
      setExIndex(exIndex + 1);
      setAnswer("");
      setResult(null);
    } else {
      setExerciseMode(false);
      const pct = (score.correct + (result ? 1 : 0)) / grammar.exercises.length;
      const updated = { ...grammarProgress, [`grammar_${grammar.id}`]: pct };
      await saveGrammar(updated);
    }
  };

  if (exerciseMode) {
    const ex = grammar.exercises[exIndex];
    return (
      <div>
        <button onClick={() => setExerciseMode(false)} style={{ fontSize: 14, color: "#666", background: "none", marginBottom: 16 }}>← 返回</button>
        <div style={{ textAlign: "center", marginBottom: 16, fontSize: 13, color: "#888" }}>
          {grammar.title} · 第 {exIndex + 1}/{grammar.exercises.length} 题 · 正确 {score.correct}/{score.total}
        </div>
        <div className="card fade-in" style={{ padding: "32px 24px" }}>
          <div className="tag" style={{ background: "#fff3e0", color: "#e8723a", marginBottom: 16 }}>{ex.hint}</div>
          <div style={{ fontSize: 18, fontWeight: 600, lineHeight: 1.6, marginBottom: 24 }}>{ex.q}</div>
          <input className="quiz-input" value={answer} onChange={e => setAnswer(e.target.value)}
            onKeyDown={e => e.key === "Enter" && (result === null ? checkAnswer() : nextExercise())}
            placeholder="输入答案..." disabled={result !== null} autoFocus
            style={result !== null ? { borderColor: result ? "#4caf50" : "#e94560", background: result ? "#e8f5e9" : "#fee" } : {}} />
          {result !== null && (
            <div className="fade-in" style={{ marginTop: 16 }}>
              {result ? (
                <div style={{ color: "#4caf50", fontWeight: 600, fontSize: 16 }}>✅ 正确！</div>
              ) : (
                <div style={{ color: "#e94560", fontWeight: 600, fontSize: 16 }}>❌ 正确答案：{ex.a}</div>
              )}
            </div>
          )}
          <div style={{ marginTop: 24, textAlign: "center" }}>
            {result === null ? (
              <button onClick={checkAnswer} style={{ padding: "14px 40px", background: "#e8723a", color: "#fff", borderRadius: 12, fontSize: 16, fontWeight: 600 }}>检查</button>
            ) : (
              <button onClick={nextExercise} style={{ padding: "14px 40px", background: "#1a1a2e", color: "#fff", borderRadius: 12, fontSize: 16, fontWeight: 600 }}>
                {exIndex < grammar.exercises.length - 1 ? "下一题 →" : "完成"}
              </button>
            )}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 20, paddingBottom: 4 }}>
        {GRAMMAR_DATA.map((g, i) => {
          const pct = grammarProgress[`grammar_${g.id}`] || 0;
          return (
            <button key={i} onClick={() => setCurrent(i)}
              style={{
                padding: "10px 16px", borderRadius: 12, fontSize: 12, fontWeight: 600,
                background: i === current ? "#e8723a" : "#fff",
                color: i === current ? "#fff" : "#333",
                border: i === current ? "none" : "1px solid #ddd",
                whiteSpace: "nowrap", flex: "0 0 auto",
              }}>
              {g.title} {pct >= 0.8 ? "✅" : ""}
            </button>
          );
        })}
      </div>
      <div className="card">
        <div className="tag" style={{ background: "#e8f0ff", color: "#4a7dff", marginBottom: 12 }}>Unit {grammar.unit}</div>
        <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 8 }}>{grammar.title}</h2>
        <p style={{ fontSize: 14, color: "#666", lineHeight: 1.6, marginBottom: 20 }}>{grammar.explanation}</p>
        {grammar.rules.map((r, i) => (
          <div key={i} style={{ padding: 16, background: i % 2 === 0 ? "#f8f9ff" : "#fff8f0", borderRadius: 12, marginBottom: 10 }}>
            <div style={{ fontWeight: 600, fontSize: 14, color: "#333", marginBottom: 6 }}>{r.rule}</div>
            <div style={{ fontSize: 15, color: "#4a7dff", fontWeight: 500 }}>{r.example}</div>
            <div style={{ fontSize: 13, color: "#888", marginTop: 4 }}>{r.translation}</div>
          </div>
        ))}
      </div>
      <button onClick={startExercise}
        style={{ width: "100%", padding: 18, background: "linear-gradient(135deg, #e8723a, #ff9a56)", color: "#fff", borderRadius: 14, fontSize: 18, fontWeight: 700, marginTop: 8 }}>
        ✏️ 开始练习 ({grammar.exercises.length} 题)
      </button>
    </div>
  );
}

// ============================================================
// READING VIEW
// ============================================================
function ReadingView({ current, setCurrent }) {
  const [showAnswers, setShowAnswers] = useState({});
  const [userAnswers, setUserAnswers] = useState({});
  const reading = READING_DATA[current];

  const toggleAnswer = (i) => {
    setShowAnswers(prev => ({ ...prev, [i]: !prev[i] }));
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 20, paddingBottom: 4 }}>
        {READING_DATA.map((r, i) => (
          <button key={i} onClick={() => { setCurrent(i); setShowAnswers({}); setUserAnswers({}); }}
            style={{
              padding: "10px 16px", borderRadius: 12, fontSize: 12, fontWeight: 600,
              background: i === current ? "#4caf50" : "#fff",
              color: i === current ? "#fff" : "#333",
              border: i === current ? "none" : "1px solid #ddd",
              whiteSpace: "nowrap", flex: "0 0 auto",
            }}>
            {r.title}
          </button>
        ))}
      </div>
      <div className="card">
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          <span className="tag" style={{ background: "#e8f0ff", color: "#4a7dff" }}>Unit {reading.unit}</span>
          <span className="tag" style={{ background: reading.difficulty === "基础" ? "#e8f5e9" : "#fff3e0", color: reading.difficulty === "基础" ? "#4caf50" : "#e8723a" }}>{reading.difficulty}</span>
        </div>
        <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 16 }}>{reading.title}</h2>
        <div style={{ fontSize: 15, lineHeight: 2, color: "#333", padding: 20, background: "#fafafa", borderRadius: 12, borderLeft: "4px solid #4caf50" }}>
          {reading.text}
        </div>
      </div>
      <div className="card">
        <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>❓ 阅读理解题</h3>
        <p style={{ fontSize: 13, color: "#e94560", marginBottom: 16 }}>💡 提示：用完整句子回答！把问题中的词变成陈述句的开头。</p>
        {reading.questions.map((q, i) => (
          <div key={i} style={{ marginBottom: 20, padding: 16, background: "#fafafa", borderRadius: 12 }}>
            <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 10 }}>{i + 1}. {q.q}</div>
            <textarea
              value={userAnswers[i] || ""}
              onChange={e => setUserAnswers(prev => ({ ...prev, [i]: e.target.value }))}
              placeholder="在这里写你的答案..."
              rows={2}
              style={{ width: "100%", padding: 12, border: "1px solid #e0e0e0", borderRadius: 10, fontSize: 14, fontFamily: "inherit", resize: "vertical", outline: "none" }}
            />
            <button onClick={() => toggleAnswer(i)}
              style={{ marginTop: 8, fontSize: 13, color: "#4a7dff", background: "none", fontWeight: 500 }}>
              {showAnswers[i] ? "🙈 隐藏参考答案" : "👁 查看参考答案"}
            </button>
            {showAnswers[i] && (
              <div className="fade-in" style={{ marginTop: 8, padding: 12, background: "#e8f5e9", borderRadius: 10, fontSize: 14, color: "#2e7d32" }}>
                <strong>参考答案：</strong>{q.a}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ============================================================
// REVIEW VIEW
// ============================================================
function ReviewView({ vocabProgress, saveVocab, reviewSchedule, saveReview, todayStr }) {
  const [reviewIndex, setReviewIndex] = useState(0);
  const [showMeaning, setShowMeaning] = useState(false);
  const [reviewing, setReviewing] = useState(false);

  const todayReviews = reviewSchedule.filter(r => r.date <= todayStr && !r.done);
  const completedToday = reviewSchedule.filter(r => r.date <= todayStr && r.done).length;

  const upcoming = {};
  reviewSchedule.filter(r => r.date > todayStr && !r.done).forEach(r => {
    upcoming[r.date] = (upcoming[r.date] || 0) + 1;
  });

  const startReview = () => {
    if (todayReviews.length === 0) return;
    setReviewIndex(0);
    setShowMeaning(false);
    setReviewing(true);
  };

  const handleReview = async (known) => {
    const item = todayReviews[reviewIndex];
    const updated = reviewSchedule.map(r => r.word === item.word && r.date === item.date ? { ...r, done: true } : r);
    const prev = vocabProgress[item.word] || { level: 0, lastDate: "" };
    const newLevel = known ? Math.min(prev.level + 1, 5) : Math.max(prev.level - 1, 0);
    const updatedVocab = { ...vocabProgress, [item.word]: { level: newLevel, lastDate: todayStr } };
    await saveVocab(updatedVocab);

    if (known && newLevel < 5) {
      const intervalIdx = Math.min(newLevel, EBBINGHAUS_INTERVALS.length - 1);
      const days = EBBINGHAUS_INTERVALS[intervalIdx];
      const reviewDate = new Date();
      reviewDate.setDate(reviewDate.getDate() + days);
      const dateStr = reviewDate.toISOString().slice(0, 10);
      updated.push({ word: item.word, zh: item.zh, date: dateStr, done: false, unit: item.unit });
    } else if (!known) {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const dateStr = tomorrow.toISOString().slice(0, 10);
      updated.push({ word: item.word, zh: item.zh, date: dateStr, done: false, unit: item.unit });
    }

    await saveReview(updated);

    if (reviewIndex < todayReviews.length - 1) {
      setReviewIndex(reviewIndex + 1);
      setShowMeaning(false);
    } else {
      setReviewing(false);
    }
  };

  if (reviewing && todayReviews.length > 0 && reviewIndex < todayReviews.length) {
    const item = todayReviews[reviewIndex];
    return (
      <div>
        <button onClick={() => setReviewing(false)} style={{ fontSize: 14, color: "#666", background: "none", marginBottom: 16 }}>← 返回</button>
        <div style={{ textAlign: "center", marginBottom: 16, fontSize: 13, color: "#888" }}>
          艾宾浩斯复习 · {reviewIndex + 1} / {todayReviews.length}
          <div className="progress-bar" style={{ marginTop: 8 }}>
            <div className="progress-fill" style={{ width: `${(reviewIndex + 1) / todayReviews.length * 100}%`, background: "#e94560" }} />
          </div>
        </div>
        <div className="card fade-in" style={{ textAlign: "center", padding: "48px 24px" }}>
          <div style={{ fontSize: 13, color: "#888", marginBottom: 8 }}>你还记得这个词吗？</div>
          <h2 style={{ fontSize: 20, color: "#555", marginBottom: 8 }}>{item.zh}</h2>
          {showMeaning ? (
            <div className="fade-in">
              <div style={{ fontSize: 36, fontWeight: 900, color: "#1a1a2e", marginTop: 16 }}>{item.word}</div>
              <div style={{ marginTop: 32, display: "flex", gap: 12, justifyContent: "center" }}>
                <button onClick={() => handleReview(false)}
                  style={{ padding: "14px 32px", background: "#fee", color: "#e94560", borderRadius: 12, fontSize: 16, fontWeight: 600 }}>
                  😕 不记得
                </button>
                <button onClick={() => handleReview(true)}
                  style={{ padding: "14px 32px", background: "#e8f5e9", color: "#4caf50", borderRadius: 12, fontSize: 16, fontWeight: 600 }}>
                  😊 记得
                </button>
              </div>
            </div>
          ) : (
            <button onClick={() => setShowMeaning(true)}
              style={{ marginTop: 24, padding: "14px 40px", background: "#e94560", color: "#fff", borderRadius: 12, fontSize: 16, fontWeight: 600 }}>
              显示答案
            </button>
          )}
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="card" style={{ background: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)", color: "#fff" }}>
        <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>🧠 艾宾浩斯遗忘曲线</h3>
        <p style={{ fontSize: 13, lineHeight: 1.7, opacity: .9 }}>
          根据科学研究，学过的内容如果不复习，1天后忘记约66%。我们按照 1天、2天、4天、7天、15天、30天 的间隔安排复习，帮助把短期记忆转化为长期记忆。
        </p>
        <div style={{ display: "flex", gap: 6, marginTop: 12, flexWrap: "wrap" }}>
          {EBBINGHAUS_INTERVALS.map((d, i) => (
            <span key={i} style={{ padding: "4px 10px", background: "rgba(255,255,255,.2)", borderRadius: 8, fontSize: 12 }}>
              第{d}天
            </span>
          ))}
        </div>
      </div>
      <div className="card">
        <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>📅 今日复习</h3>
        {todayReviews.length > 0 ? (
          <>
            <p style={{ fontSize: 14, color: "#666", marginBottom: 16 }}>有 {todayReviews.length} 个单词需要复习</p>
            <button onClick={startReview}
              style={{ width: "100%", padding: 18, background: "linear-gradient(135deg, #e94560, #ff6b6b)", color: "#fff", borderRadius: 14, fontSize: 18, fontWeight: 700 }}>
              🔄 开始复习 ({todayReviews.length} 个)
            </button>
            <div style={{ marginTop: 16, maxHeight: 200, overflowY: "auto" }}>
              {todayReviews.map((r, i) => (
                <div key={i} style={{ padding: "8px 12px", background: "#fafafa", borderRadius: 8, marginBottom: 6, display: "flex", justifyContent: "space-between", fontSize: 14 }}>
                  <span style={{ color: "#888" }}>{r.zh}</span>
                  <span className="tag" style={{ background: "#fee", color: "#e94560" }}>待复习</span>
                </div>
              ))}
            </div>
          </>
        ) : (
          <div style={{ textAlign: "center", padding: 32 }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
            <div style={{ fontSize: 16, fontWeight: 600, color: "#4caf50" }}>今日无需复习！</div>
            <div style={{ fontSize: 13, color: "#888", marginTop: 4 }}>
              {completedToday > 0 ? `已完成 ${completedToday} 个复习` : "去学习新单词吧！"}
            </div>
          </div>
        )}
      </div>
      {Object.keys(upcoming).length > 0 && (
        <div className="card">
          <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>📆 未来复习安排</h3>
          {Object.entries(upcoming).sort().slice(0, 7).map(([date, count]) => {
            const d = new Date(date);
            const dayName = d.toLocaleDateString("zh-CN", { month: "short", day: "numeric", weekday: "short" });
            return (
              <div key={date} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: "#fafafa", borderRadius: 10, marginBottom: 8 }}>
                <span style={{ fontSize: 14, fontWeight: 500 }}>{dayName}</span>
                <span className="pill" style={{ background: "#e8f0ff", color: "#4a7dff" }}>{count} 个单词</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
